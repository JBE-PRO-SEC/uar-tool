<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef } = React;
const XL = window.XLSX;

// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════

const ACCOUNT_TYPES = [
  { id:'admin_pam',   label:'Admins / PAM',                 frequence:'Mensuelle',     days:30  },
  { id:'admin_app',   label:'Admins applicatifs',            frequence:'Trimestrielle', days:90  },
  { id:'service',     label:'Comptes de service',            frequence:'Semestrielle',  days:180 },
  { id:'prestataire', label:'Prestataires / accès externes', frequence:'Trimestrielle', days:90  },
  { id:'standard',    label:'Utilisateurs standard',         frequence:'Annuelle',      days:365 },
  { id:'dormant',     label:'Comptes dormants (>90j)',       frequence:'Mensuelle',     days:30  },
];

const DORMANT_DAYS = 90;

const DEC = { ATTENTE:'en_attente', MAINTENIR:'maintenir', REVOQUER:'revoquer' };

const ITYPE = {
  ecart:    { label:'Sans ticket', color:'amber' },
  orphelin: { label:'Orphelin',    color:'red'   },
  dormant:  { label:'Dormant',     color:'blue'  },
};

// ══════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════

const nk = (u,a,p) => [u,a,p].map(s=>String(s??"").toLowerCase().trim()).join("|||");
const ik = i => `${i.type}|||${nk(i.utilisateur, i.application||'', i.profil||'')}`;

function parseExcel(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XL.read(new Uint8Array(e.target.result),{type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XL.utils.sheet_to_json(ws,{defval:""});
        res({ rows, headers: rows.length?Object.keys(rows[0]):[], name:file.name });
      } catch(err){rej(err);}
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

const HINTS = {
  utilisateur:       ["utilisateur","user","login","identifiant","matricule","compte","account","samaccountname"],
  application:       ["application","app","système","systeme","service","outil","tool"],
  profil:            ["profil","rôle","role","droit","permission","groupe","habilitation","access"],
  derniere_connexion:["connexion","lastlogon","lastlogin","dernier","last login","last logon","date connexion"],
  type_compte:       ["type","catégorie","categorie","account type"],
};

function autoDetect(headers, type) {
  for(const h of headers)
    if(HINTS[type]?.some(k=>h.toLowerCase().includes(k))) return h;
  return "";
}

function suggestMap1(headers) {
  return {
    utilisateur:       autoDetect(headers,"utilisateur")||headers[0]||"",
    application:       autoDetect(headers,"application")||"",
    profil:            autoDetect(headers,"profil")||"",
    derniere_connexion:autoDetect(headers,"derniere_connexion"),
    type_compte:       autoDetect(headers,"type_compte"),
  };
}

function suggestMap2(headers) {
  return {
    utilisateur: autoDetect(headers,"utilisateur")||headers[0]||"",
    application: autoDetect(headers,"application")||"",
    profil:      autoDetect(headers,"profil")||"",
  };
}

function parseDate(val) {
  if(!val) return null;
  if(typeof val==='number') { const d=new Date((val-25569)*86400*1000); return isNaN(d)?null:d; }
  const d = new Date(String(val).trim());
  return isNaN(d)?null:d;
}

function daysSince(date) {
  if(!date) return null;
  return Math.floor((Date.now()-date.getTime())/(1000*60*60*24));
}

function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate()+n); return d;
}

function fmtDate(val) {
  if(!val) return "—";
  return new Date(val).toLocaleDateString("fr-FR");
}

function dl(content, type, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

// ══════════════════════════════════════════════════════════════
// COMPUTE
// ══════════════════════════════════════════════════════════════

function computeEcarts(r1,r2,m1,m2) {
  const ok = new Set(r2.map(r=>nk(r[m2.utilisateur],r[m2.application],r[m2.profil])));
  return r1.filter(r=>!ok.has(nk(r[m1.utilisateur],r[m1.application],r[m1.profil]))).map(r=>({
    type:'ecart',
    utilisateur:String(r[m1.utilisateur]??""),
    application:String(r[m1.application]??""),
    profil:     String(r[m1.profil]??""),
    derniereConnexion: m1.derniere_connexion ? parseDate(r[m1.derniere_connexion]) : null,
  }));
}

function computeOrphelins(r1,r3,m1,m3) {
  if(!r3||!m3.utilisateur) return [];
  const hr = new Set(r3.map(r=>String(r[m3.utilisateur]??"").toLowerCase().trim()));
  const seen = new Set(); const out = [];
  for(const r of r1){
    const u = String(r[m1.utilisateur]??"").toLowerCase().trim();
    if(u && !hr.has(u) && !seen.has(u)){
      seen.add(u);
      out.push({
        type:'orphelin',
        utilisateur:String(r[m1.utilisateur]??""),
        application:String(r[m1.application]??""),
        profil:     String(r[m1.profil]??""),
        derniereConnexion: m1.derniere_connexion ? parseDate(r[m1.derniere_connexion]) : null,
      });
    }
  }
  return out;
}

function computeDormants(r1,m1) {
  if(!m1.derniere_connexion) return [];
  return r1.filter(r=>{
    const d=parseDate(r[m1.derniere_connexion]);
    const j=daysSince(d);
    return j!==null && j>DORMANT_DAYS;
  }).map(r=>({
    type:'dormant',
    utilisateur:String(r[m1.utilisateur]??""),
    application:String(r[m1.application]??""),
    profil:     String(r[m1.profil]??""),
    derniereConnexion: parseDate(r[m1.derniere_connexion]),
    joursInactif: daysSince(parseDate(r[m1.derniere_connexion])),
  }));
}

// ══════════════════════════════════════════════════════════════
// EMAIL TEMPLATES
// ══════════════════════════════════════════════════════════════

function mailInitial(app, issues, resp, campaign) {
  const deadline = fmtDate(campaign?.deadline)||"[DATE LIMITE]";
  const n = issues.length;
  const rows = issues.map((e,i)=>`  ${i+1}. ${e.utilisateur} — Profil : ${e.profil||"N/A"} — Type : ${ITYPE[e.type]?.label||e.type}`).join("\n");
  return `Objet : [UAR] Revue des accès – ${app} – ${n} anomalie(s) détectée(s)

Bonjour ${resp.nom||"[Responsable]"},

Dans le cadre de la campagne de revue périodique des accès utilisateurs (UAR${campaign?.label?` — ${campaign.label}`:""}), une analyse des droits provisionnés sur ${app} a mis en évidence ${n} anomalie(s) nécessitant votre validation.

▌ Accès concernés :

${rows}

Pour chacun de ces accès, nous vous remercions de nous indiquer votre décision :
  • MAINTENIR — le droit est légitime et justifié au regard des fonctions actuelles
  • RÉVOQUER  — le droit doit être supprimé

⚠ Règle fail-safe : tout accès sans réponse à la date de clôture (${deadline}) sera automatiquement traité comme "À révoquer".

Merci de nous faire un retour avant le ${deadline}.

Bien cordialement,
[Votre nom / Votre signature]`;
}

function mailRelance(app, issues, resp, campaign, type) {
  const deadline = fmtDate(campaign?.deadline)||"[DATE LIMITE]";
  const pending = issues.filter(i=>!i._dec||i._dec===DEC.ATTENTE);
  const n = pending.length;
  const rows = pending.map((e,i)=>`  ${i+1}. ${e.utilisateur} — Profil : ${e.profil||"N/A"}`).join("\n");
  const isJ10 = type==='j10';
  return `Objet : [UAR] ${isJ10?"Relance 1/2":"⚠ Dernière relance"} – ${app} – ${n} accès en attente

Bonjour ${resp.nom||"[Responsable]"},

${isJ10
  ? `Sauf erreur de notre part, nous n'avons pas encore reçu votre réponse concernant la revue des accès de ${app}, initiée il y a 10 jours.`
  : `Nous sommes à 10 jours de la clôture de la campagne de revue des accès. Passé le ${deadline}, les accès sans réponse seront automatiquement révoqués (règle fail-safe).`
}

▌ Accès toujours en attente de validation (${n}) :

${rows}

${isJ10
  ? `Merci de nous faire un retour avant le ${deadline}.`
  : `Merci de traiter ce point en priorité avant le ${deadline}.`
}

Bien cordialement,
[Votre nom / Votre signature]`;
}

const PAL = {
  amber:  {bg:"#2d1a00",fg:"#fbbf24",bd:"#78350f"},
  green:  {bg:"#052e16",fg:"#4ade80",bd:"#166534"},
  red:    {bg:"#450a0a",fg:"#f87171",bd:"#991b1b"},
  blue:   {bg:"#0c1a2e",fg:"#60a5fa",bd:"#1e40af"},
  gray:   {bg:"#1c1c1c",fg:"#9ca3af",bd:"#374151"},
  purple: {bg:"#1e0a2e",fg:"#c084fc",bd:"#6b21a8"},
};

function Badge({children, color="amber"}) {
  const p=PAL[color]||PAL.gray;
  return <span style={{background:p.bg,color:p.fg,border:`1px solid ${p.bd}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,fontFamily:"monospace",whiteSpace:"nowrap"}}>{children}</span>;
}

function StatCard({label, value, sub, color="#58a6ff"}) {
  return (
    <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"16px 20px",flex:"1 1 130px"}}>
      <div style={{fontSize:28,fontWeight:700,color,fontFamily:"monospace",lineHeight:1}}>{value}</div>
      <div style={{fontSize:12,color:"#8b949e",marginTop:5,fontWeight:500}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:"#6e7681",marginTop:2}}>{sub}</div>}
    </div>

}

function DropZone({label, onFile, fileName, optional=false}) {
  const ref=useRef(); const [drag,setDrag]=useState(false);
  return (
    <div onClick={()=>ref.current.click()}
      onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);e.dataTransfer.files[0]&&onFile(e.dataTransfer.files[0]);}}
      style={{border:`2px dashed ${drag?"#f59e0b":fileName?"#3fb950":optional?"#21262d":"#30363d"}`,borderRadius:8,padding:"18px 14px",textAlign:"center",cursor:"pointer",background:drag?"#1a1500":"#0d1117",transition:"all .18s",userSelect:"none"}}>
      <input ref={ref} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
      <div style={{fontSize:22,marginBottom:5}}>{fileName?"✅":optional?"📎":"📂"}</div>
      <div style={{color:fileName?"#3fb950":optional?"#4b5563":"#8b949e",fontSize:12,fontWeight:500}}>{fileName||label}</div>
      {optional&&!fileName&&<div style={{color:"#374151",fontSize:10,marginTop:2}}>Optionnel</div>}
      {fileName&&<div style={{color:"#4b5563",fontSize:10,marginTop:2}}>Cliquer pour remplacer</div>}
    </div>
  );
}

function ColMapper({headers, mapping, onChange, label, fields}) {
  if(!headers?.length) return null;
  const sel={background:"#0d1117",border:"1px solid #30363d",color:"#e6edf3",borderRadius:5,padding:"4px 7px",fontSize:12,flex:1,outline:"none",fontFamily:"monospace"};
  return (
    <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"12px 14px"}}>
      <div style={{fontSize:10,color:"#6e7681",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {fields.map(f=>(
          <div key={f.key} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,width:20,textAlign:"center"}}>{f.icon}</span>
            <span style={{fontSize:11,color:f.required?"#8b949e":"#4b5563",width:175,flexShrink:0}}>{f.label}{!f.required&&<span style={{color:"#374151"}}> (opt.)</span>}</span>
            <select value={mapping[f.key]||""} onChange={e=>onChange({...mapping,[f.key]:e.target.value})} style={sel}>
              {!f.required&&<option value="">— Non mappé —</option>}
              {headers.map(h=><option key={h} value={h}>{h}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
  );
}

function DecisionBtn({value, onChange}) {
  const opts=[
    {v:DEC.ATTENTE,  label:"En attente", fg:"#9ca3af", activeBg:"#1c1c1c", activeBd:"#374151"},
    {v:DEC.MAINTENIR,label:"Maintenir",  fg:"#4ade80", activeBg:"#052e16", activeBd:"#166534"},
    {v:DEC.REVOQUER, label:"Révoquer",   fg:"#f87171", activeBg:"#450a0a", activeBd:"#991b1b"},
  ];
  return (
    <div style={{display:"flex",gap:3}}>
      {opts.map(o=>(
        <button key={o.v} onClick={()=>onChange(o.v)} style={{
          padding:"3px 7px",fontSize:10,fontWeight:600,cursor:"pointer",borderRadius:3,transition:"all .12s",
          border:`1px solid ${value===o.v?o.activeBd:"#30363d"}`,
          background:value===o.v?o.activeBg:"transparent",
          color:value===o.v?o.fg:"#4b5563",
        }}>{o.label}</button>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP

function App() {
  const today = new Date().toISOString().slice(0,10);
  const [campaign, setCampaign] = useState({type:'standard', label:'', startDate:today, deadline:addDays(new Date(),30).toISOString().slice(0,10)});
  const [file1,setFile1]=useState(null); const [file2,setFile2]=useState(null); const [file3,setFile3]=useState(null);
  const [map1,setMap1]=useState({utilisateur:"",application:"",profil:"",derniere_connexion:"",type_compte:""});
  const [map2,setMap2]=useState({utilisateur:"",application:"",profil:""});
  const [map3,setMap3]=useState({utilisateur:""});
  const [decisions,setDecisions]=useState({});
  const [responsables,setResponsables]=useState({});
  const [relances,setRelances]=useState({});
  const [tab,setTab]=useState("campagne");
  const [subTab,setSubTab]=useState("ecarts");
  const [mailTab,setMailTab]=useState("initial");
  const [search,setSearch]=useState(""); const [filterApp,setFilterApp]=useState("all"); const [filterDec,setFilterDec]=useState("all");
  const [copied,setCopied]=useState(null);
  const sessionRef=useRef();

  const handleFile = async(raw,which) => {
    try {
      const p=await parseExcel(raw);
      if(which===1){setFile1(p);setMap1(suggestMap1(p.headers));}
      else if(which===2){setFile2(p);setMap2(suggestMap2(p.headers));}
      else{setFile3(p);setMap3({utilisateur:autoDetect(p.headers,"utilisateur")||p.headers[0]||""});}
    } catch(e){alert("Erreur lecture : "+e.message);}
  };

  const setDec = (key,val) => setDecisions(p=>({...p,[key]:val}));
  const markRelance = (app,type) => setRelances(p=>({...p,[app]:{...(p[app]||{}),[type]:new Date().toISOString()}}));
  const updateResp = (app,f,v) => setResponsables(p=>({...p,[app]:{...(p[app]||{}),[f]:v}}));

  const ecarts    = useMemo(()=>{ if(!file1||!file2||!map1.utilisateur||!map2.utilisateur) return []; return computeEcarts(file1.rows,file2.rows,map1,map2); },[file1,file2,map1,map2]);
  const orphelins = useMemo(()=>{ if(!file1||!file3||!map1.utilisateur||!map3.utilisateur) return []; return computeOrphelins(file1.rows,file3.rows,map1,map3); },[file1,file3,map1,map3]);
  const dormants  = useMemo(()=>{ if(!file1||!map1.derniere_connexion) return []; return computeDormants(file1.rows,map1); },[file1,map1]);

  const allIssues = useMemo(()=>[...ecarts,...orphelins,...dormants].map(i=>({...i,_key:ik(i),_dec:decisions[ik(i)]||DEC.ATTENTE})),[ecarts,orphelins,dormants,decisions]);
  const apps = useMemo(()=>[...new Set(allIssues.map(i=>i.application))].sort(),[allIssues]);

  const viewIssues = useMemo(()=>{
    const src = subTab==='ecarts' ? ecarts : subTab==='orphelins' ? orphelins : subTab==='dormants' ? dormants : allIssues.map(i=>({...i}));
    let res = src.map(i=>({...i,_key:ik(i),_dec:decisions[ik(i)]||DEC.ATTENTE}));
    if(filterApp!=="all") res=res.filter(i=>i.application===filterApp);
    if(filterDec!=="all") res=res.filter(i=>i._dec===filterDec);
    if(search){const q=search.toLowerCase();res=res.filter(i=>i.utilisateur.toLowerCase().includes(q)||(i.application||"").toLowerCase().includes(q)||(i.profil||"").toLowerCase().includes(q));}
    return res;
  },[allIssues,ecarts,orphelins,dormants,decisions,subTab,filterApp,filterDec,search]);

  const stats = useMemo(()=>{
    const n=allIssues.length;
    return {
      total:n, ecarts:ecarts.length, orphelins:orphelins.length, dormants:dormants.length,
      maintenir:allIssues.filter(i=>i._dec===DEC.MAINTENIR).length,
      revoquer: allIssues.filter(i=>i._dec===DEC.REVOQUER).length,
      attente:  allIssues.filter(i=>i._dec===DEC.ATTENTE).length,
      pct: n>0?Math.round((allIssues.filter(i=>i._dec!==DEC.ATTENTE).length/n)*100):0,
    };
  },[allIssues,ecarts,orphelins,dormants]);

  const exportSession = () => {
    const s={version:2,exportedAt:new Date().toISOString(),campaign,
      file1:file1?{name:file1.name,rows:file1.rows,headers:file1.headers}:null,
      file2:file2?{name:file2.name,rows:file2.rows,headers:file2.headers}:null,
      file3:file3?{name:file3.name,rows:file3.rows,headers:file3.headers}:null,
      map1,map2,map3,decisions,responsables,relances};
    dl(JSON.stringify(s,null,2),"application/json",`uar_session_${campaign.startDate}.json`);
  };

  const importSession = file => {
    const r=new FileReader();
    r.onload=e=>{
      try {
        const s=JSON.parse(e.target.result);
        if(s.campaign) setCampaign(s.campaign);
        if(s.file1) setFile1(s.file1); if(s.file2) setFile2(s.file2); if(s.file3) setFile3(s.file3);
        if(s.map1) setMap1(s.map1); if(s.map2) setMap2(s.map2); if(s.map3) setMap3(s.map3);
        if(s.decisions) setDecisions(s.decisions);
        if(s.responsables) setResponsables(s.responsables);
        if(s.relances) setRelances(s.relances);
        setTab("analyse");
      } catch{alert("JSON invalide");}
    };
    r.readAsText(file);
  };

  const copyText = (id,text) => {
    navigator.clipboard.writeText(text).catch(()=>{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);});
    setCopied(id); setTimeout(()=>setCopied(null),2200);
  };

  const ready=!!(file1&&file2&&map1.utilisateur&&map2.utilisateur);
  const btn=(color="#f59e0b",bg="transparent")=>({background:bg,border:`1px solid ${color}`,color,borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:500,fontFamily:"system-ui,sans-serif"});
  const inp={background:"#161b22",border:"1px solid #30363d",color:"#e6edf3",borderRadius:6,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"system-ui,sans-serif"};
  const stb=(active,off=false)=>({padding:"9px 14px",border:"none",background:"transparent",borderBottom:active?"2px solid #f59e0b":"2px solid transparent",color:active?"#f59e0b":off?"#374151":"#8b949e",cursor:off?"not-allowed":"pointer",fontSize:12,fontWeight:500,fontFamily:"system-ui,sans-serif",whiteSpace:"nowrap"});

  const TABS=[
    {id:"campagne",     label:"① Campagne"},
    {id:"import",       label:"② Import",       dot:ready},
    {id:"analyse",      label:"③ Analyse",       dot:allIssues.length>0, off:!ready},
    {id:"responsables", label:"④ Responsables",  off:!ready},
    {id:"mails",        label:"⑤ Mails",         off:!ready},
    {id:"bilan",        label:"⑥ Bilan",         off:!ready},
  ];

  // ── ① CAMPAGNE ──────────────────────────────────────────────
  const TabCampagne = () => {
    const at=ACCOUNT_TYPES.find(a=>a.id===campaign.type)||ACCOUNT_TYPES[4];
    const start=new Date(campaign.startDate);
    return (
      <div style={{maxWidth:640}}>
        <div style={{marginBottom:18,padding:"12px 16px",background:"#0c1a2e",border:"1px solid #1e40af",borderRadius:8}}>
          <div style={{fontSize:12,color:"#60a5fa",fontWeight:600,marginBottom:4}}>Fréquences de revue selon la politique</div>
          <div style={{fontSize:11,color:"#8b949e",lineHeight:1.9}}>
            Admins / PAM → Mensuelle &nbsp;·&nbsp; Admin applicatif → Trimestrielle &nbsp;·&nbsp; Service → Semestrielle<br/>
            Prestataires → Trimestrielle &nbsp;·&nbsp; Utilisateurs standard → Annuelle &nbsp;·&nbsp; Dormants → Mensuelle
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:11,color:"#8b949e",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:5}}>Type de campagne</label>
            <select value={campaign.type} onChange={e=>{
              const at2=ACCOUNT_TYPES.find(a=>a.id===e.target.value);

          <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:10,color:"#6e7681",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Résultats</div>
            {[["Total anomalies",stats.total,"#f59e0b"],["→ Sans ticket",stats.ecarts,"#fbbf24"],["→ Orphelins",stats.orphelins,"#f87171"],["→ Dormants",stats.dormants,"#60a5fa"],["Maintenir",stats.maintenir,"#3fb950"],["Révoquer",stats.revoquer,"#f85149"],["En attente",stats.attente,"#9ca3af"]].map(([k,v,c])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}>
                <span style={{color:"#8b949e"}}>{k}</span><span style={{color:c,fontWeight:600,fontFamily:"monospace"}}>{v}</span>
              </div>
            ))}
            <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #21262d",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#8b949e"}}>Taux de traitement</span>
              <span style={{fontSize:18,fontWeight:700,color:pctColor,fontFamily:"monospace"}}>{stats.pct}%</span>
            </div>
          </div>
        </div>

        <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontSize:10,color:"#6e7681",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Checklist de clôture ISO 27001</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {checklist.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:9}}>
                <span style={{fontSize:13,width:18,textAlign:"center"}}>{c.ok?"✅":"⬜"}</span>
                <span style={{fontSize:12,color:c.ok?"#e6edf3":"#4b5563"}}>{c.label}</span>
              </div>
            ))}
          </div>
        </div>

        {revocation.length>0&&(
          <div style={{background:"#1a0505",border:"1px solid #991b1b",borderRadius:8,padding:"14px 16px",marginBottom:18}}>
            <div style={{fontSize:10,color:"#f87171",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>
              Droits à révoquer — à transmettre à la DSI ({revocation.length})
            </div>
            <div style={{maxHeight:200,overflowY:"auto"}}>
              {revocation.map((r,i)=>(
                <div key={i} style={{fontSize:11,fontFamily:"monospace",color:"#e6edf3",marginBottom:4,padding:"4px 8px",background:"#450a0a",borderRadius:3,display:"inline-flex",gap:8,marginRight:6}}>
                  <span style={{color:"#f87171"}}>{r.utilisateur}</span>
                  <span style={{color:"#6e7681"}}>·</span>
                  <span style={{color:"#60a5fa"}}>{r.application}</span>
                  <span style={{color:"#6e7681"}}>·</span>
                  <span>{r.profil||"—"}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button style={btn("#8b949e")} onClick={exportSession}>↓ Sauvegarder session</button>
          <button style={btn("#f59e0b","#1c1407")} onClick={exportBilan}>↓ Exporter bilan JSON</button>
        </div>
      </div>
    );
  };

  // ── RENDER ─────────────────────────────────────────────────
  return (
    <div style={{background:"#0d1117",minHeight:"100vh",color:"#e6edf3",fontFamily:"system-ui,sans-serif",fontSize:14}}>
      <style>{"*{box-sizing:border-box;margin:0;padding:0}select option{background:#161b22}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}"}</style>

      <div style={{background:"#161b22",borderBottom:"1px solid #30363d",padding:"12px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontWeight:700,fontSize:15,letterSpacing:"-0.02em",display:"flex",alignItems:"center",gap:10}}>
            🛡 UAR — Revue des Accès Utilisateurs
            <span style={{fontSize:10,color:"#f59e0b",fontFamily:"monospace",background:"#2d1a00",border:"1px solid #78350f",borderRadius:3,padding:"2px 6px"}}>v2.0</span>
          </div>
          <div style={{color:"#6e7681",fontSize:11,marginTop:2}}>Écarts · Orphelins · Dormants · Recertification · Fail-safe · Bilan ISO 27001</div>
        </div>
        <div style={{display:"flex",gap:7}}>
          <input ref={sessionRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{importSession(e.target.files[0]);e.target.value="";}}/>
          <button style={btn("#8b949e")} onClick={()=>sessionRef.current.click()}>↑ Charger session</button>
          <button style={btn("#f59e0b","#1c1407")} onClick={exportSession}>↓ Sauvegarder</button>
        </div>
      </div>

      <div style={{display:"flex",background:"#0d1117",borderBottom:"1px solid #21262d",padding:"0 18px",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>!t.off&&setTab(t.id)} style={{
            padding:"10px 15px",border:"none",background:"transparent",whiteSpace:"nowrap",
            borderBottom:tab===t.id?"2px solid #f59e0b":"2px solid transparent",
            color:tab===t.id?"#f59e0b":t.off?"#374151":"#8b949e",
            cursor:t.off?"not-allowed":"pointer",fontSize:12,fontWeight:500,
            display:"flex",alignItems:"center",gap:5,fontFamily:"system-ui,sans-serif",
          }}>
            {t.label}
            {t.dot&&<span style={{width:5,height:5,borderRadius:"50%",background:"#3fb950",display:"inline-block"}}/>}
          </button>
        ))}
      </div>

      <div style={{padding:"22px 22px",maxWidth:1100,margin:"0 auto"}}>
        {tab==="campagne"     && <TabCampagne/>}
        {tab==="import"       && <TabImport/>}
        {tab==="analyse"      && <TabAnalyse/>}
        {tab==="responsables" && <TabResponsables/>}
        {tab==="mails"        && <TabMails/>}
        {tab==="bilan"        && <TabBilan/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
